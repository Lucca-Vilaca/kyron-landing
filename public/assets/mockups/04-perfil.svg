<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="393" height="852" viewBox="0 0 393 852" fill="none">
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
  ]]></style>

  <!-- Kyron Perfil (Profile) Screen -->
  <defs>
    <radialGradient id="navKyronGlowP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4C430" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scoreRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4C430"/>
      <stop offset="1" stop-color="#E0AE10"/>
    </linearGradient>
    <clipPath id="profileAvatarClip">
      <circle cx="46" cy="46" r="46"/>
    </clipPath>
    <clipPath id="navAvatarClipP">
      <circle cx="14" cy="14" r="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="393" height="852" fill="#0A0A0A"/>

  <!-- Status bar -->
  <text x="32" y="36" fill="#FFFFFF" font-family="Inter, system-ui" font-size="17" font-weight="600">18:07</text>
  <g transform="translate(320, 22)">
    <rect x="0" y="10" width="3" height="4" rx="0.5" fill="#FFFFFF"/>
    <rect x="5" y="7" width="3" height="7" rx="0.5" fill="#FFFFFF"/>
    <rect x="10" y="4" width="3" height="10" rx="0.5" fill="#FFFFFF"/>
    <rect x="15" y="1" width="3" height="13" rx="0.5" fill="#FFFFFF" opacity="0.3"/>
    <path d="M26 8 Q32 3 38 8" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M28 11 Q32 7 36 11" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="14" r="1.5" fill="#FFFFFF"/>
    <rect x="46" y="5" width="22" height="10" rx="2.5" stroke="#FFFFFF" stroke-width="1" fill="none"/>
    <rect x="69" y="7.5" width="1.5" height="5" rx="0.5" fill="#FFFFFF"/>
    <rect x="48" y="7" width="17" height="6" rx="1" fill="#F4C430"/>
    <text x="50" y="12.5" fill="#000000" font-family="Inter" font-size="7" font-weight="700">39</text>
  </g>

  <!-- Profile avatar with yellow ring -->
  <g transform="translate(150, 76)">
    <circle cx="46" cy="46" r="48" fill="none" stroke="#F4C430" stroke-width="2.5"/>
    <circle cx="46" cy="46" r="44" fill="#3A2A1A"/>
    <g clip-path="url(#profileAvatarClip)">
      <rect x="0" y="0" width="92" height="92" fill="#4A3518"/>
      <!-- Stylized silhouette holding trophy -->
      <circle cx="46" cy="38" r="16" fill="#D4A76A"/>
      <ellipse cx="46" cy="80" rx="30" ry="24" fill="#8B6334"/>
      <!-- Trophy hint -->
      <rect x="40" y="14" width="12" height="10" rx="2" fill="#F4C430"/>
      <rect x="37" y="22" width="18" height="2" fill="#F4C430"/>
    </g>
  </g>

  <!-- Name -->
  <text x="196.5" y="200" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="30" font-weight="700" text-anchor="middle" letter-spacing="2">LUCCA</text>
  <!-- Level badge -->
  <text x="196.5" y="224" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2.5">INTERMEDIÁRIO</text>

  <!-- Sport chips row 1 -->
  <g transform="translate(24, 244)">
    <rect x="0" y="0" width="52" height="30" rx="10" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
    <text x="26" y="20" fill="#B5B5B5" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">MMA</text>

    <rect x="60" y="0" width="56" height="30" rx="10" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
    <text x="88" y="20" fill="#B5B5B5" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">BOXE</text>

    <rect x="124" y="0" width="92" height="30" rx="10" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
    <text x="170" y="20" fill="#B5B5B5" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">MUAY THAI</text>

    <rect x="224" y="0" width="116" height="30" rx="10" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
    <text x="282" y="20" fill="#B5B5B5" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">MUSCULAÇÃO</text>
  </g>

  <!-- Sport chips row 2 -->
  <g transform="translate(64, 282)">
    <rect x="0" y="0" width="116" height="30" rx="10" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
    <text x="58" y="20" fill="#B5B5B5" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">CONDITIONING</text>

    <rect x="124" y="0" width="130" height="30" rx="10" fill="#151515" stroke="#2A2A2A" stroke-width="1"/>
    <text x="189" y="20" fill="#B5B5B5" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">ARTES MARCIAIS</text>
  </g>

  <!-- Kyron Score ring -->
  <g transform="translate(141, 340)">
    <!-- Base ring -->
    <circle cx="55" cy="55" r="48" fill="none" stroke="#1F1F1F" stroke-width="3.5"/>
    <!-- Progress arc (starts at top, sweeps ~88%) using explicit path -->
    <path d="M 55 7 A 48 48 0 1 1 14 79" fill="none" stroke="#F4C430" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Score number -->
    <text x="55" y="60" fill="#F4C430" font-family="'Anton', sans-serif" font-size="32" font-weight="700" text-anchor="middle">9</text>
    <!-- Label -->
    <text x="55" y="78" fill="#9A9A9A" font-family="Inter" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2">KYRON SCORE</text>
  </g>

  <!-- Inline stats row -->
  <g transform="translate(0, 470)">
    <!-- XP -->
    <text x="85" y="18" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="28" font-weight="700" text-anchor="middle">450</text>
    <text x="85" y="40" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1">XP</text>
    <!-- Seguindo -->
    <text x="196.5" y="18" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="28" font-weight="700" text-anchor="middle">1</text>
    <text x="196.5" y="40" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="500" text-anchor="middle">Seguindo</text>
    <!-- Seguidores -->
    <text x="308" y="18" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="28" font-weight="700" text-anchor="middle">1</text>
    <text x="308" y="40" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="500" text-anchor="middle">Seguidores</text>

    <!-- Separators -->
    <line x1="140" y1="4" x2="140" y2="36" stroke="#1F1F1F"/>
    <line x1="253" y1="4" x2="253" y2="36" stroke="#1F1F1F"/>
  </g>

  <!-- Stat cards row -->
  <g transform="translate(24, 540)">
    <!-- Treinos -->
    <rect x="0" y="0" width="108" height="72" rx="14" fill="#151515" stroke="#1F1F1F" stroke-width="1"/>
    <text x="54" y="32" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="26" font-weight="700" text-anchor="middle">3</text>
    <text x="54" y="58" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1">TREINOS</text>

    <!-- Semanas -->
    <rect x="118" y="0" width="108" height="72" rx="14" fill="#151515" stroke="#1F1F1F" stroke-width="1"/>
    <text x="172" y="32" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="26" font-weight="700" text-anchor="middle">2</text>
    <text x="172" y="58" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="600" text-anchor="middle" letter-spacing="1">SEMANAS</text>

    <!-- XP Total (highlight) -->
    <rect x="236" y="0" width="108" height="72" rx="14" fill="#1F1A0A" stroke="#F4C430" stroke-width="1"/>
    <text x="290" y="32" fill="#F4C430" font-family="'Anton', sans-serif" font-size="26" font-weight="700" text-anchor="middle">450</text>
    <text x="290" y="58" fill="#F4C430" font-family="Inter" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">XP TOTAL</text>
  </g>

  <!-- List item: Editar Perfil de Treino -->
  <g transform="translate(24, 640)">
    <rect width="345" height="48" rx="0" fill="none"/>
    <line x1="0" y1="0" x2="345" y2="0" stroke="#1A1A1A" stroke-width="1"/>
    <text x="0" y="30" fill="#FFFFFF" font-family="Inter" font-size="14" font-weight="500">Editar Perfil de Treino</text>
    <g transform="translate(335, 22)" stroke="#9A9A9A" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="0,-6 6,0 0,6"/>
    </g>
    <line x1="0" y1="48" x2="345" y2="48" stroke="#1A1A1A" stroke-width="1"/>
  </g>

  <!-- List item: Notificações -->
  <g transform="translate(24, 690)">
    <text x="0" y="30" fill="#FFFFFF" font-family="Inter" font-size="14" font-weight="500">Notificações</text>
    <g transform="translate(335, 22)" stroke="#9A9A9A" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="0,-6 6,0 0,6"/>
    </g>
    <line x1="0" y1="48" x2="345" y2="48" stroke="#1A1A1A" stroke-width="1"/>
  </g>

  <!-- Bottom Navigation Bar -->
  <g transform="translate(0, 752)">
    <rect x="0" y="0" width="393" height="100" fill="#0A0A0A"/>
    <rect x="0" y="0" width="393" height="1" fill="#1F1F1F"/>

    <!-- INÍCIO -->
    <g transform="translate(39, 16)">
      <g stroke="#9A9A9A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 10 L10 2 L20 10 L20 20 L0 20 Z"/>
        <path d="M7 20 L7 14 L13 14 L13 20"/>
      </g>
      <text x="10" y="40" fill="#9A9A9A" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">INÍCIO</text>
    </g>

    <!-- TREINOS -->
    <g transform="translate(114, 18)">
      <g stroke="#9A9A9A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="16" x2="16" y2="2"/>
        <path d="M0 12 L4 16 L0 20 L-2 18 L-2 14 Z" fill="#9A9A9A"/>
        <path d="M16 0 L12 4 L16 8 L18 6 L18 2 Z" fill="#9A9A9A"/>
      </g>
      <text x="8" y="38" fill="#9A9A9A" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">TREINOS</text>
    </g>

    <!-- KYRON (center) -->
    <g transform="translate(176, 0)">
      <circle cx="20" cy="24" r="34" fill="url(#navKyronGlowP)"/>
      <circle cx="20" cy="24" r="22" fill="#0A0A0A" stroke="#F4C430" stroke-width="1.5"/>
      <text x="20" y="31" fill="#F4C430" font-family="'Anton', sans-serif" font-size="20" font-weight="700" text-anchor="middle">K</text>
      <text x="20" y="76" fill="#F4C430" font-family="Inter" font-size="9" font-weight="800" text-anchor="middle" letter-spacing="1.2">KYRON</text>
    </g>

    <!-- SOCIAL -->
    <g transform="translate(260, 20)">
      <g stroke="#9A9A9A" stroke-width="1.8" fill="none" stroke-linecap="round">
        <circle cx="6" cy="6" r="4"/>
        <circle cx="18" cy="6" r="4"/>
        <path d="M0 18 Q0 12 6 12 Q12 12 12 18"/>
        <path d="M12 18 Q12 12 18 12 Q24 12 24 18"/>
      </g>
      <text x="12" y="36" fill="#9A9A9A" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">SOCIAL</text>
    </g>

    <!-- PERFIL (ACTIVE) -->
    <g transform="translate(335, 14)">
      <circle cx="14" cy="14" r="15" fill="none" stroke="#F4C430" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="13" fill="#3A2A1A"/>
      <g clip-path="url(#navAvatarClipP)">
        <circle cx="14" cy="11" r="5" fill="#D4A76A"/>
        <ellipse cx="14" cy="26" rx="10" ry="7" fill="#8B6334"/>
      </g>
      <text x="14" y="42" fill="#F4C430" font-family="Inter" font-size="9" font-weight="800" text-anchor="middle" letter-spacing="1.2">PERFIL</text>
    </g>
  </g>
</svg>
