<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="393" height="852" viewBox="0 0 393 852" fill="none">
  <style type="text/css"><![CDATA[
    @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap');
    text { font-family: 'Inter', system-ui, sans-serif; }
  ]]></style>

  <!-- Kyron Home Screen -->
  <defs>
    <linearGradient id="yellowGradHome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4C430"/>
      <stop offset="1" stop-color="#E0AE10"/>
    </linearGradient>
    <linearGradient id="cardMainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0E0E0E"/>
    </linearGradient>
    <radialGradient id="navKyronGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F4C430" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#F4C430" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="avatarClip">
      <circle cx="17" cy="17" r="17"/>
    </clipPath>
    <clipPath id="avatarClipLarge">
      <circle cx="22" cy="22" r="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="393" height="852" fill="#0A0A0A"/>

  <!-- Status bar -->
  <text x="32" y="36" fill="#FFFFFF" font-family="Inter, system-ui" font-size="17" font-weight="600">18:07</text>
  <g transform="translate(320, 22)">
    <rect x="0" y="10" width="3" height="4" rx="0.5" fill="#FFFFFF"/>
    <rect x="5" y="7" width="3" height="7" rx="0.5" fill="#FFFFFF"/>
    <rect x="10" y="4" width="3" height="10" rx="0.5" fill="#FFFFFF"/>
    <rect x="15" y="1" width="3" height="13" rx="0.5" fill="#FFFFFF" opacity="0.3"/>
    <path d="M26 8 Q32 3 38 8" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M28 11 Q32 7 36 11" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="14" r="1.5" fill="#FFFFFF"/>
    <rect x="46" y="5" width="22" height="10" rx="2.5" stroke="#FFFFFF" stroke-width="1" fill="none"/>
    <rect x="69" y="7.5" width="1.5" height="5" rx="0.5" fill="#FFFFFF"/>
    <rect x="48" y="7" width="17" height="6" rx="1" fill="#F4C430"/>
    <text x="50" y="12.5" fill="#000000" font-family="Inter" font-size="7" font-weight="700">39</text>
  </g>

  <!-- Header: KYRON logo + avatar -->
  <g transform="translate(24, 82)">
    <!-- Logo icon K -->
    <rect x="0" y="0" width="32" height="32" rx="8" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
    <text x="16" y="22" fill="#F4C430" font-family="'Anton', sans-serif" font-size="18" font-weight="700" text-anchor="middle">K</text>
    <text x="42" y="23" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="20" font-weight="700" letter-spacing="2.5">KYRON</text>

    <!-- Avatar -->
    <g transform="translate(303, 0)">
      <circle cx="17" cy="17" r="18" fill="none" stroke="#F4C430" stroke-width="1.5"/>
      <circle cx="17" cy="17" r="16" fill="#3A2A1A"/>
      <g clip-path="url(#avatarClip)">
        <!-- Avatar placeholder: person silhouette -->
        <rect x="0" y="0" width="34" height="34" fill="#4A3518"/>
        <circle cx="17" cy="13" r="6" fill="#D4A76A"/>
        <ellipse cx="17" cy="30" rx="12" ry="9" fill="#8B6334"/>
        <path d="M0 0 L34 0 L34 10 L0 10 Z" fill="#2C1F10"/>
      </g>
    </g>
  </g>

  <!-- Greeting -->
  <text x="24" y="168" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="38" font-weight="700" letter-spacing="0.3">OLÁ, LUCCA!</text>
  <text x="24" y="195" fill="#B5B5B5" font-family="Inter" font-size="11" font-weight="600" letter-spacing="2">ALCANÇANDO A GLÓRIA ETERNA</text>

  <!-- Main training card -->
  <g transform="translate(20, 218)">
    <rect width="353" height="462" rx="20" fill="url(#cardMainGrad)" stroke="#F4C430" stroke-width="1.5"/>

    <!-- Week day selector -->
    <g transform="translate(20, 22)">
      <!-- SEX -->
      <rect x="0" y="0" width="50" height="32" rx="10" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
      <text x="25" y="20" fill="#9A9A9A" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">SEX</text>
      <!-- QUI -->
      <rect x="56" y="0" width="50" height="32" rx="10" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
      <text x="81" y="20" fill="#9A9A9A" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">QUI</text>
      <!-- QUA (SELECTED) -->
      <rect x="112" y="0" width="50" height="32" rx="10" fill="#1F1A0A" stroke="#F4C430" stroke-width="1.5"/>
      <text x="137" y="20" fill="#F4C430" font-family="Inter" font-size="11" font-weight="800" text-anchor="middle" letter-spacing="1">QUA</text>
      <!-- TER -->
      <rect x="168" y="0" width="50" height="32" rx="10" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
      <text x="193" y="20" fill="#9A9A9A" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">TER</text>

      <!-- AI sparkles icon -->
      <g transform="translate(289, 4)">
        <circle cx="12" cy="12" r="12" fill="#1F1A0A" stroke="#F4C430" stroke-width="1"/>
        <path d="M12 5 L13.2 10.5 L18.5 12 L13.2 13.5 L12 19 L10.8 13.5 L5.5 12 L10.8 10.5 Z" fill="#F4C430"/>
        <circle cx="17.5" cy="6.5" r="1" fill="#F4C430"/>
      </g>
    </g>

    <!-- Sport tag + pagination -->
    <g transform="translate(20, 70)">
      <rect x="0" y="0" width="86" height="26" rx="8" fill="#1F1A0A" stroke="#F4C430" stroke-width="1"/>
      <text x="43" y="17" fill="#F4C430" font-family="Inter" font-size="10" font-weight="800" text-anchor="middle" letter-spacing="1.2">MUAY THAI</text>
      <!-- Pagination -->
      <g transform="translate(258, 6)" fill="#9A9A9A" font-family="Inter" font-size="11" font-weight="600">
        <polyline points="0,8 6,3 6,13" fill="#9A9A9A"/>
        <text x="14" y="12">1/3</text>
        <polyline points="50,3 56,8 50,13" fill="#9A9A9A"/>
      </g>
    </g>

    <!-- Workout title -->
    <text x="20" y="140" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="30" font-weight="700" letter-spacing="0.3">
      <tspan x="20" dy="0">TREINO DE MUAY</tspan>
      <tspan x="20" dy="34">THAI - QUARTA</tspan>
    </text>

    <!-- Quote -->
    <text x="20" y="230" fill="#CCCCCC" font-family="Inter" font-size="13" font-weight="400" font-style="italic">
      <tspan x="20" dy="0">"Tudo o que você sempre quis está do</tspan>
      <tspan x="20" dy="18">outro lado do medo."</tspan>
    </text>
    <text x="333" y="282" fill="#9A9A9A" font-family="Inter" font-size="11" font-weight="500" text-anchor="end" font-style="italic">— George Addair</text>

    <!-- Stats grid -->
    <g transform="translate(20, 298)">
      <!-- Duração card -->
      <rect x="0" y="0" width="150" height="68" rx="12" fill="#0A0A0A" stroke="#1F1F1F" stroke-width="1"/>
      <text x="14" y="22" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="700" letter-spacing="1.5">DURAÇÃO</text>
      <text x="14" y="53" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="22" font-weight="700" letter-spacing="0.5">60 MIN</text>

      <!-- Intensidade card -->
      <rect x="163" y="0" width="150" height="68" rx="12" fill="#0A0A0A" stroke="#1F1F1F" stroke-width="1"/>
      <text x="177" y="22" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="700" letter-spacing="1.5">INTENSIDADE</text>
      <text x="177" y="53" fill="#F4C430" font-family="'Anton', sans-serif" font-size="22" font-weight="700" letter-spacing="0.5">ALTA</text>

      <!-- Foco card -->
      <rect x="0" y="78" width="150" height="68" rx="12" fill="#0A0A0A" stroke="#1F1F1F" stroke-width="1"/>
      <text x="14" y="100" fill="#9A9A9A" font-family="Inter" font-size="10" font-weight="700" letter-spacing="1.5">FOCO</text>
      <text x="14" y="131" fill="#FFFFFF" font-family="'Anton', sans-serif" font-size="22" font-weight="700" letter-spacing="0.5">TÉCNICAS ...</text>
    </g>

    <!-- CTA Iniciar treino -->
    <g transform="translate(20, 472)">
      <!-- actually rendered outside card below -->
    </g>
  </g>

  <!-- Iniciar Treino CTA (inside card, at bottom) -->
  <g transform="translate(36, 676)">
    <rect width="321" height="56" rx="14" fill="url(#yellowGradHome)"/>
    <text x="106" y="35" fill="#0A0A0A" font-family="Inter" font-size="14" font-weight="800" letter-spacing="2">INICIAR TREINO</text>
    <!-- Play icon -->
    <g transform="translate(240, 22)">
      <polygon points="0,0 12,7 0,14" fill="#0A0A0A"/>
    </g>
  </g>

  <!-- Bottom Navigation Bar -->
  <g transform="translate(0, 752)">
    <rect x="0" y="0" width="393" height="100" fill="#0A0A0A"/>
    <rect x="0" y="0" width="393" height="1" fill="#1F1F1F"/>

    <!-- 5 items: INICIO | TREINOS | KYRON (center) | SOCIAL | PERFIL -->
    <!-- INÍCIO (active) -->
    <g transform="translate(39, 16)">
      <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 10 L10 2 L20 10 L20 20 L0 20 Z"/>
        <path d="M7 20 L7 14 L13 14 L13 20" fill="#FFFFFF" stroke="#FFFFFF"/>
      </g>
      <text x="10" y="40" fill="#FFFFFF" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">INÍCIO</text>
    </g>

    <!-- TREINOS -->
    <g transform="translate(114, 18)">
      <g stroke="#9A9A9A" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="16" x2="16" y2="2"/>
        <path d="M0 12 L4 16 L0 20 L-2 18 L-2 14 Z M16 0 L12 4 L16 8 L18 6 L18 2 Z" fill="#9A9A9A"/>
      </g>
      <text x="8" y="38" fill="#9A9A9A" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">TREINOS</text>
    </g>

    <!-- KYRON (center, highlighted) -->
    <g transform="translate(176, 0)">
      <circle cx="20" cy="24" r="34" fill="url(#navKyronGlow)"/>
      <circle cx="20" cy="24" r="22" fill="#0A0A0A" stroke="#F4C430" stroke-width="1.5"/>
      <text x="20" y="31" fill="#F4C430" font-family="'Anton', sans-serif" font-size="20" font-weight="700" text-anchor="middle">K</text>
      <text x="20" y="76" fill="#F4C430" font-family="Inter" font-size="9" font-weight="800" text-anchor="middle" letter-spacing="1.2">KYRON</text>
    </g>

    <!-- SOCIAL -->
    <g transform="translate(260, 20)">
      <g stroke="#9A9A9A" stroke-width="1.8" fill="none" stroke-linecap="round">
        <circle cx="6" cy="6" r="4"/>
        <circle cx="18" cy="6" r="4"/>
        <path d="M0 18 Q0 12 6 12 Q12 12 12 18"/>
        <path d="M12 18 Q12 12 18 12 Q24 12 24 18"/>
      </g>
      <text x="12" y="36" fill="#9A9A9A" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">SOCIAL</text>
    </g>

    <!-- PERFIL (avatar) -->
    <g transform="translate(335, 14)">
      <circle cx="14" cy="14" r="14" fill="#3A2A1A" stroke="#1F1F1F" stroke-width="1"/>
      <g clip-path="url(#avatarClipLarge)" transform="translate(-8, -8)">
        <circle cx="22" cy="19" r="6" fill="#D4A76A"/>
        <ellipse cx="22" cy="36" rx="12" ry="9" fill="#8B6334"/>
      </g>
      <text x="14" y="42" fill="#9A9A9A" font-family="Inter" font-size="9" font-weight="700" text-anchor="middle" letter-spacing="1.2">PERFIL</text>
    </g>
  </g>
</svg>
